<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnoplagas - Panel de Clientes</title>
  
  <style>
    :root {
      --primary-color: #00b074; 
      --primary-hover: #009662;
      --blue-btn: #2563eb;
      --blue-hover: #1d4ed8;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #334155;
      --text-muted: #64748b;
      --red-btn: #ef4444;
      --red-hover: #dc2626;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 30px;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .tabs-left {
      display: flex;
      gap: 10px;
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .tab-btn.active-green {
      background-color: #00b074;
      color: white;
    }
    
    .tab-btn.inactive-gray {
      background-color: #e2e8f0;
      color: #475569;
    }

    .btn-inicio {
      background-color: #64748b;
      color: white;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .titulo-modulo {
      font-size: 26px;
      font-weight: bold;
      color: #1e293b;
      margin-top: 0;
      margin-bottom: 25px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      color: #475569;
    }

    input[type="text"], input[type="email"], select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-main);
      background-color: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(0, 176, 116, 0.15);
    }

    fieldset {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      background-color: #f8fafc;
    }

    legend {
      font-weight: bold;
      font-size: 14px;
      color: #1e293b;
      padding: 0 10px;
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary-color); 
      color: white;
      border: none;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: background-color 0.2s;
    }

    .btn-submit:hover {
      background-color: var(--primary-hover);
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 25px;
    }

    .search-input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 14px 14px 45px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
    }

    .search-wrapper::before {
      content: "🔍";
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
    }

    .table-container {
      overflow-x: auto;
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    table.clientes-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    table.clientes-table th {
      background-color: #f1f5f9;
      color: #475569;
      font-weight: bold;
      padding: 14px;
      border-bottom: 2px solid var(--border-color);
    }

    table.clientes-table td {
      padding: 14px;
      border-bottom: 1px solid var(--border-color);
    }

    .btn-editar, .btn-eliminar {
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      margin-right: 4px;
    }

    .btn-editar { background-color: var(--blue-btn); }
    .btn-editar:hover { background-color: var(--blue-hover); }
    .btn-eliminar { background-color: var(--red-btn); }
    .btn-eliminar:hover { background-color: var(--red-hover); }

    .seccion-modulo { display: none; }
    .seccion-modulo.active { display: block; }
  </style>
</head>
<body>

  <div class="container">
    <div class="nav-bar">
      <div class="tabs-left">
        <button id="tab-registrar" class="tab-btn active-green" onclick="cambiarVista('registrar')">👤 Registrar Cliente</button>
        <button id="tab-consultar" class="tab-btn inactive-gray" onclick="cambiarVista('consultar')">🔍 Consultar Catálogo</button>
      </div>
      <a href="index.html" class="btn-inicio">🏠 Menú Inicio</a>
    </div>

    <!-- PESTAÑA 1: REGISTRO Y EDICIÓN -->
    <div id="vista-registro" class="seccion-modulo active">
      <div class="titulo-modulo" id="form-titulo">Fumigadora Tecnoplagas - Nuevo Cliente</div>
      
      <form id="cliente-form">
        <input type="hidden" id="cliente-id-edicion">

        <fieldset>
          <legend>Datos Estructurados del Cliente</legend>
          
          <div class="form-row">
            <div class="form-group">
              <label for="cliente-consecutivo">Consecutivo del Cliente</label>
              <input type="text" id="cliente-consecutivo" readonly placeholder="Generando...">
            </div>
            <div class="form-group">
              <label for="cliente-nombre">Nombre Completo / Razón Social</label>
              <input type="text" id="cliente-nombre" required placeholder="Ej: Everst Rojas Camacho">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="cliente-cedula">Cédula</label>
              <input type="text" id="cliente-cedula" required placeholder="Ej: 0107610813">
            </div>
            <div class="form-group">
              <label for="cliente-sucursal">Sucursal</label>
              <input type="text" id="cliente-sucursal" placeholder="Ej: Cartago, La Unión, Tres Ríos">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="cliente-telefono">Teléfono</label>
              <input type="text" id="cliente-telefono" required placeholder="Ej: 89877776">
            </div>
            <div class="form-group">
              <label for="cliente-correo">Email</label>
              <input type="email" id="cliente-correo" required placeholder="Ej: gtpcrc@gmail.com">
            </div>
            <div class="form-group">
              <label for="cliente-frecuencia">Frecuencia de Fumigación</label>
              <select id="cliente-frecuencia" required>
                <option value="">Seleccione frecuencia...</option>
                <option value="Mensual">Mensual</option>
                <option value="Bimensual">Bimensual</option>
                <option value="Trimestral">Trimestral</option>
                <option value="Semestral">Semestral</option>
                <option value="Unica vez">Única vez</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full-width">
              <label for="cliente-direccion">Dirección</label>
              <textarea id="cliente-direccion" required placeholder="Detalle la localización física exacta..."></textarea>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="cliente-gps">Coordenadas GPS (Texto)</label>
              <input type="text" id="cliente-gps" placeholder="Ej: 9.9080975, -83.9921879" value="0, 0">
            </div>
          </div>
        </fieldset>

        <button type="submit" id="btn-submit-cliente" class="btn-submit">
          💾 Guardar Cliente
        </button>
      </form>
    </div>

    <!-- PESTAÑA 2: CONSULTA Y CONTROL -->
    <div id="vista-consulta" class="seccion-modulo">
      <div class="titulo-modulo">Fumigadora Tecnoplagas - Consulta de Clientes</div>
      
      <div class="search-wrapper">
        <input type="text" id="input-buscar-cliente" class="search-input" placeholder="Buscar por Nombre, Cédula o Consecutivo...">
      </div>

      <div class="table-container">
        <table class="clientes-table">
          <thead>
            <tr>
              <th>ID/Consecutivo</th>
              <th>Nombre / Razón Social</th>
              <th>Cédula</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th>Frecuencia</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-clientes-body">
            <tr>
              <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 30px;">
                Conectando al servidor...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    window.cambiarVista = function(vista) {
      const btnReg = document.getElementById('tab-registrar');
      const btnCon = document.getElementById('tab-consultar');
      const vistaReg = document.getElementById('vista-registro');
      const vistaCon = document.getElementById('vista-consulta');

      if (vista === 'registrar') {
        btnReg.className = 'tab-btn active-green';
        btnCon.className = 'tab-btn inactive-gray';
        vistaReg.classList.add('active');
        vistaCon.classList.remove('active');
      } else {
        btnReg.className = 'tab-btn inactive-gray';
        btnCon.className = 'tab-btn active-green';
        vistaReg.classList.remove('active');
        vistaCon.classList.add('active');
      }
    }
  </script>

  <!-- LÓGICA DIRECTA REVISADA CON TUS LLAVES EXACTAS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "fumigadora-tecnoplagas.firebaseapp.com",
      projectId: "fumigadora-tecnoplagas",
      storageBucket: "fumigadora-tecnoplagas.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let todosLosClientes = [];

    function generarSiguienteConsecutivo(lista) {
      if (lista.length === 0) return "CLI-000001";
      let maxNum = 0;
      lista.forEach(c => {
        if (c.consecutivo && c.consecutivo.startsWith("CLI-")) {
          const num = parseInt(c.consecutivo.replace("CLI-", ""), 10);
          if (!isNaN(num) && num > maxNum) maxNum = num;
        }
      });
      return "CLI-" + String(maxNum + 1).padStart(6, '0');
    }

    async function cargarClientesDesdeFirestore() {
      const tbody = document.getElementById('tabla-clientes-body');
      const inputConsecutivo = document.getElementById('cliente-consecutivo');
      if (!tbody) return;

      try {
        // CORREGIDO: Apunta a 'clientes' en minúscula tal como en tu Firebase
        const querySnapshot = await getDocs(collection(db, "clientes"));
        todosLosClientes = [];
        tbody.innerHTML = "";

        querySnapshot.forEach((doc) => {
          todosLosClientes.push({ id: doc.id, ...doc.data() });
        });

        if (inputConsecutivo && !document.getElementById('cliente-id-edicion').value) {
          inputConsecutivo.value = generarSiguienteConsecutivo(todosLosClientes);
        }

        if (todosLosClientes.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No hay clientes en la colección 'clientes'.</td></tr>`;
          return;
        }

        renderizarTabla(todosLosClientes);
      } catch (error) {
        console.error("Error en Firebase:", error);
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:red;">Error al conectar. Verifica las claves.</td></tr>`;
      }
    }

    function renderizarTabla(lista) {
      const tbody = document.getElementById('tabla-clientes-body');
      if (!tbody) return;
      tbody.innerHTML = "";

      lista.forEach((cliente) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-family: monospace; font-weight: bold; color: #2563eb;">${cliente.consecutivo || "---"}</td>
          <td style="font-weight: bold;">${cliente.nombre || "---"}</td>
          <td>${cliente.cedula || "---"}</td>
          <td>${cliente.telefono || "---"}</td>
          <td style="font-size: 13px;">${cliente.email || "---"}</td>
          <td><span style="background:#e2e8f0; padding:2px 6px; border-radius:4px; font-size:12px;">${cliente.frecuenciaFumigacion || "---"}</span></td>
          <td>
            <button class="btn-editar" data-id="${cliente.id}">✏️ Editar</button>
            <button class="btn-eliminar" data-id="${cliente.id}">🗑️ Borrar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      inicializarAcciones();
    }

    function inicializarAcciones() {
      document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', function() {
          const id = this.getAttribute('data-id');
          const cliente = todosLosClientes.find(c => c.id === id);

          if (cliente) {
            // Asignación con los campos exactos de tu documento Firestore
            document.getElementById('cliente-id-edicion').value = id;
            document.getElementById('cliente-consecutivo').value = cliente.consecutivo || "";
            document.getElementById('cliente-nombre').value = cliente.nombre || "";
            document.getElementById('cliente-cedula').value = cliente.cedula || "";
            document.getElementById('cliente-sucursal').value = cliente.sucursal || "";
            document.getElementById('cliente-telefono').value = cliente.telefono || "";
            document.getElementById('cliente-correo').value = cliente.email || "";
            document.getElementById('cliente-frecuencia').value = cliente.frecuenciaFumigacion || "";
            document.getElementById('cliente-direccion').value = cliente.direccion || "";
            document.getElementById('cliente-gps').value = cliente.gps || "0, 0";

            document.getElementById('form-titulo').textContent = "⚠️ Editando Datos del Cliente";
            document.getElementById('btn-submit-cliente').textContent = "💾 Actualizar Cambios en Base de Datos";
            document.getElementById('btn-submit-cliente').style.backgroundColor = "#2563eb";

            if (typeof window.cambiarVista === 'function') window.cambiarVista('registrar');
          }
        });
      });

      document.querySelectorAll('.btn-eliminar').forEach(btn => {
        btn.addEventListener('click', async function() {
          const id = this.getAttribute('data-id');
          const cliente = todosLosClientes.find(c => c.id === id);
          if (confirm(`¿Desea borrar permanentemente a ${cliente?.nombre || 'este registro'}?`)) {
            try {
              // CORREGIDO: Apunta a 'clientes'
              await deleteDoc(doc(db, "clientes", id));
              alert("🗑️ Eliminado correctamente.");
              cargarClientesDesdeFirestore();
            } catch (err) { console.error(err); }
          }
        });
      });
    }

    cargarClientesDesdeFirestore();

    const formulario = document.getElementById('cliente-form');
    const buscador = document.getElementById('input-buscar-cliente');

    if (buscador) {
      buscador.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        const filtrados = todosLosClientes.filter(c => {
          return (c.nombre || "").toLowerCase().includes(query) || 
                 (c.cedula || "").toLowerCase().includes(query) || 
                 (c.consecutivo || "").toLowerCase().includes(query);
        });
        renderizarTabla(filtrados);
      });
    }

    if (formulario) {
      formulario.addEventListener('submit', async (e) => {
        e.preventDefault();
        const idEdicion = document.getElementById('cliente-id-edicion').value;
        
        // Mapeo idéntico al esquema de tu Firestore
        const payload = {
          "cedula": document.getElementById('cliente-cedula').value,
          "consecutivo": document.getElementById('cliente-consecutivo').value,
          "frecuenciaFumigacion": document.getElementById('cliente-frecuencia').value,
          "direccion": document.getElementById('cliente-direccion').value,
          "email": document.getElementById('cliente-correo').value,
          "nombre": document.getElementById('cliente-nombre').value,
          "sucursal": document.getElementById('cliente-sucursal').value,
          "telefono": document.getElementById('cliente-telefono').value,
          "gps": document.getElementById('cliente-gps').value
        };

        try {
          if (idEdicion) {
            // CORREGIDO: Apunta a 'clientes'
            await updateDoc(doc(db, "clientes", idEdicion), payload);
            alert("✅ ¡Datos actualizados correctamente!");
            document.getElementById('cliente-id-edicion').value = "";
            document.getElementById('form-titulo').textContent = "Fumigadora Tecnoplagas - Nuevo Cliente";
            document.getElementById('btn-submit-cliente').textContent = "💾 Guardar Cliente";
            document.getElementById('btn-submit-cliente').style.backgroundColor = "#00b074";
          } else {
            // Campos de creación con la fecha en texto o formato ISO según desees
            payload["fechaRegistro"] = new Date().toISOString();
            // CORREGIDO: Apunta a 'clientes'
            await addDoc(collection(db, "clientes"), payload);
            alert("✅ ¡Cliente guardado con éxito!");
          }

          formulario.reset();
          cargarClientesDesdeFirestore();
          if (typeof window.cambiarVista === 'function') window.cambiarVista('consultar');
        } catch (error) {
          console.error(error);
          alert("Error de comunicación con Firestore.");
        }
      });
    }
  </script>
</body>
</html>
