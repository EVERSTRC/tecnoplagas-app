<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Clientes - Firebase</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body { font-family: system-ui, sans-serif; background: var(--light); color: var(--dark); margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { margin-top: 0; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 4px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-secondary { background: #64748b; }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 0.9em; }
        th { background: #f1f5f9; }
        .actions-btn { padding: 4px 8px; font-size: 0.8em; margin: 0 2px; width: auto; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <!-- FORMULARIO DE INGRESO / EDICIÓN -->
    <div class="card">
        <h2 id="form-title">Nuevo Cliente</h2>
        <form id="cliente-form">
            <input type="hidden" id="id-documento"> <!-- ID interno de Firestore -->
            
            <div class="form-group">
                <label>Consecutivo</label>
                <input type="text" id="consecutivo" placeholder="Ej: Cl000001" required>
            </div>
            
            <div class="form-group">
                <label>Cédula / Identificación</label>
                <input type="text" id="cedula" required>
            </div>
            
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label>Sucursal</label>
                <input type="text" id="sucursal">
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
            </div>

            <div class="form-group">
                <label>Frecuencia de Fumigación</label>
                <input type="text" id="frecuencia" placeholder="Ej: Mensual, Trimestral">
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="direccion">
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>GPS Latitud</label>
                    <input type="number" step="any" id="lat" placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>GPS Longitud</label>
                    <input type="number" step="any" id="lng" placeholder="0.0">
                </div>
            </div>

            <button type="submit" id="btn-submit" class="btn-primary">Guardar Cliente</button>
            <button type="button" id="btn-cancelar" class="btn-secondary" style="display:none;">Cancelar Edición</button>
        </form>
    </div>

    <!-- LISTADO EN TIEMPO REAL -->
    <div class="card">
        <h2>Listado de Clientes</h2>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Consecutivo</th>
                        <th>Cédula</th>
                        <th>Nombre</th>
                        <th>Sucursal</th>
                        <th>Frecuencia</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-clientes">
                    <!-- Se carga dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Configuración de Firebase -->
<script type="module">
    // Importar SDKs necesarios de la CDN de Firebase v10
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, GeoPoint, Timestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. Reemplaza esto con las credenciales de tu proyecto de Firebase
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_AUTH_DOMAIN",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_STORAGE_BUCKET",
        messagingSenderId: "TU_MESSAGING_SENDER_ID",
        appId: "TU_APP_ID"
    };

    // Inicializar Firebase e Instancia de la Base de Datos
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Referencia a la colección apuntada según tu tabla (/Clientes)
    const clientesRef = collection(db, "Clientes");

    // Elementos del DOM
    const form = document.getElementById('cliente-form');
    const tablaClientes = document.getElementById('tabla-clientes');
    const formTitle = document.getElementById('form-title');
    const btnSubmit = document.getElementById('btn-submit');
    const btnCancelar = document.getElementById('btn-cancelar');
    const idDocInput = document.getElementById('id-documento');

    // Estado local para cuando editamos un cliente
    let editMode = false;

    // 2. LEER DATOS EN TIEMPO REAL (onSnapshot actualiza el HTML automáticamente al cambiar Firebase)
    onSnapshot(clientesRef, (snapshot) => {
        tablaClientes.innerHTML = ""; // Limpiar tabla
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const id = doc.id;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${data.Consecutivo || ''}</strong></td>
                <td>${data.Cedula || ''}</td>
                <td>${data.nombre || 'Sin nombre'}</td>
                <td>${data.sucursal || ''}</td>
                <td>${data["Frecuencia de Fumigacion"] || ''}</td>
                <td>
                    <button class="actions-btn btn-primary btn-editar" data-id="${id}">Editar</button>
                </td>
            `;
            tablaClientes.appendChild(tr);
        });

        // Asignar eventos a los nuevos botones de editar creados
        document.querySelectorAll('.btn-editar').forEach(btn => {
            btn.addEventListener('click', (e) => cargarClienteParaEditar(e.target.dataset.id, snapshot));
        });
    });

    // 3. GUARDAR O EDITAR DATOS
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Extraer y estructurar los datos respetando los tipos de Firebase
        const lat = parseFloat(document.getElementById('lat').value) || 0;
        const lng = parseFloat(document.getElementById('lng').value) || 0;

        const clienteData = {
            "Cedula": document.getElementById('cedula').value,
            "Consecutivo": document.getElementById('consecutivo').value,
            "Frecuencia de Fumigacion": document.getElementById('frecuencia').value,
            "GPS": new GeoPoint(lat, lng), // Tipo Geopoint requerido
            "direccion": document.getElementById('direccion').value,
            "email": document.getElementById('email').value,
            "sucursal": document.getElementById('sucursal').value,
            "telefono": document.getElementById('telefono').value,
            "nombre": document.getElementById('nombre').value
        };

        try {
            if (!editMode) {
                // Agregar campo de fecha de registro solo en nuevas creaciones
                clienteData.fecharegistro = Timestamp.now(); 
                
                await addDoc(clientesRef, clienteData);
                alert("Cliente registrado exitosamente.");
            } else {
                // Actualizar documento existente
                const docRef = doc(db, "Clientes", idDocInput.value);
                await updateDoc(docRef, clienteData);
                alert("Cliente actualizado exitosamente.");
                resetForm();
            }
            form.reset();
        } catch (error) {
            console.error("Error al procesar la solicitud: ", error);
            alert("Ocurrió un error al guardar.");
        }
    });

    // 4. PASAR DATOS AL FORMULARIO PARA EDITAR
    function cargarClienteParaEditar(id, snapshot) {
        let cliente = null;
        snapshot.forEach(doc => { if(doc.id === id) cliente = doc.data(); });

        if(!cliente) return;

        // Cambiar interfaz visual a modo edición
        editMode = true;
        idDocInput.value = id;
        formTitle.textContent = "Editar Cliente";
        btnSubmit.textContent = "Actualizar Cambios";
        btnSubmit.className = "btn-success";
        btnCancelar.style.display = "block";

        // Rellenar campos del formulario
        document.getElementById('cedula').value = cliente.Cedula || '';
        document.getElementById('consecutivo').value = cliente.Consecutivo || '';
        document.getElementById('frecuencia').value = cliente["Frecuencia de Fumigacion"] || '';
        document.getElementById('direccion').value = cliente.direccion || '';
        document.getElementById('email').value = cliente.email || '';
        document.getElementById('nombre').value = cliente.nombre || '';
        document.getElementById('sucursal').value = cliente.sucursal || '';
        document.getElementById('telefono').value = cliente.telefono || '';
        
        // Manejo del campo GeoPoint
        if(cliente.GPS) {
            document.getElementById('lat').value = cliente.GPS.latitude;
            document.getElementById('lng').value = cliente.GPS.longitude;
        } else {
            document.getElementById('lat').value = '';
            document.getElementById('lng').value = '';
        }
    }

    // Cancelar la edición y limpiar
    btnCancelar.addEventListener('click', resetForm);

    function resetForm() {
        editMode = false;
        form.reset();
        idDocInput.value = "";
        formTitle.textContent = "Nuevo Cliente";
        btnSubmit.textContent = "Guardar Cliente";
        btnSubmit.className = "btn-primary";
        btnCancelar.style.display = "none";
    }
</script>

</body>
</html>
