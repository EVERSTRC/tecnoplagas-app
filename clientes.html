<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnoplagas - Panel de Clientes</title>
  
  <style>
    :root {
      --primary-color: #00b074; 
      --primary-hover: #009662;
      --blue-btn: #2563eb;
      --blue-hover: #1d4ed8;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #334155;
      --text-muted: #64748b;
      --red-btn: #ef4444;
      --red-hover: #dc2626;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 30px;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .btn-inicio {
      background-color: #64748b;
      color: white;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .titulo-modulo {
      font-size: 26px;
      font-weight: bold;
      color: #1e293b;
      margin-top: 0;
      margin-bottom: 25px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      color: #475569;
    }

    input[type="text"], input[type="email"], select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-main);
      background-color: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(0, 176, 116, 0.15);
    }

    fieldset {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
      background-color: #f8fafc;
    }

    legend {
      font-weight: bold;
      font-size: 14px;
      color: #1e293b;
      padding: 0 10px;
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary-color); 
      color: white;
      border: none;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: background-color 0.2s;
    }

    .btn-submit:hover {
      background-color: var(--primary-hover);
    }

    .table-container {
      overflow-x: auto;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-top: 25px;
    }

    table.clientes-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    table.clientes-table th {
      background-color: #f1f5f9;
      color: #475569;
      font-weight: bold;
      padding: 14px;
      border-bottom: 2px solid var(--border-color);
    }

    table.clientes-table td {
      padding: 14px;
      border-bottom: 1px solid var(--border-color);
    }

    .btn-editar, .btn-eliminar {
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      margin-right: 4px;
    }

    .btn-editar {
      background-color: var(--blue-btn);
    }
    .btn-editar:hover {
      background-color: var(--blue-hover);
    }

    .btn-eliminar {
      background-color: var(--red-btn);
    }
    .btn-eliminar:hover {
      background-color: var(--red-hover);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="nav-bar">
      <div class="titulo-modulo">Fumigadora Tecnoplagas - Control de Clientes</div>
      <a href="index.html" class="btn-inicio">🏠 Menú Inicio</a>
    </div>

    <!-- FORMULARIO DE REGISTRO Y EDICIÓN -->
    <form id="cliente-form">
      <!-- Input oculto clave para saber si estamos editando o creando un nuevo registro -->
      <input type="hidden" id="cliente-id-edicion">

      <fieldset>
        <legend>👤 Ficha del Cliente</legend>
        
        <div class="form-row">
          <div class="form-group">
            <label for="cliente-nombre">Nombre Completo / Razón Social</label>
            <input type="text" id="cliente-nombre" required placeholder="Ej: Corporación S.A. o Juan Pérez">
          </div>
          <div class="form-group">
            <label for="cliente-cedula">Cédula (Física / Jurídica)</label>
            <input type="text" id="cliente-cedula" required placeholder="Ej: 3-101-XXXXXX">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cliente-telefono">Teléfono de Contacto</label>
            <input type="text" id="cliente-telefono" required placeholder="Ej: 8888-8888">
          </div>
          <div class="form-group">
            <label for="cliente-correo">Correo Electrónico</label>
            <input type="email" id="cliente-correo" required placeholder="Ej: cliente@correo.com">
          </div>
        </div>

        <div class="form-group full-width">
          <label for="cliente-direccion">Dirección Física Completa</label>
          <textarea id="cliente-direccion" required placeholder="Provincia, Cantón, Distrito y detalles específicos..."></textarea>
        </div>
      </fieldset>

      <button type="submit" id="btn-submit-cliente" class="btn-submit">
        💾 Guardar Cliente
      </button>
    </form>

    <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 40px 0;">

    <!-- TABLA DE HISTORIAL DE CLIENTES -->
    <div class="titulo-modulo" style="font-size: 20px; margin-bottom: 15px;">📋 Catálogo de Clientes Registrados</div>
    <div class="table-container">
      <table class="clientes-table">
        <thead>
          <tr>
            <th>Nombre / Razón Social</th>
            <th>Identificación</th>
            <th>Teléfono</th>
            <th>Correo Electrónico</th>
            <th>Dirección</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-clientes-body">
          <tr>
            <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">
              Sincronizando la base de datos de clientes en tiempo real...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Vinculación del script correspondiente modular -->
  <script type="module" src="clientes.js"></script>
</body>
</html>
