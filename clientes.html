<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Clientes</title>
    <!-- Tailwind CSS para diseño responsivo en Tablet y Celular -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center sm:text-left">👥 Registro de Clientes</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- FORMULARIO DE REGISTRO (Se adapta arriba en celular, a un lado en tablet/PC) -->
            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-1">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Nuevo Cliente</h2>
                <form id="clientForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Nombre Completo</label>
                        <input type="text" id="nombre" required class="mt-1 w-full p-2 border rounded-md focus:ring focus:ring-blue-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Teléfono</label>
                        <input type="tel" id="telefono" required class="mt-1 w-full p-2 border rounded-md focus:ring focus:ring-blue-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Correo Electrónico</label>
                        <input type="email" id="email" class="mt-1 w-full p-2 border rounded-md focus:ring focus:ring-blue-200 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition font-medium">
                        Guardar Cliente
                    </button>
                </form>
            </div>

            <!-- LISTADO DE CLIENTES -->
            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-2">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Lista de Clientes</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b text-gray-600 text-sm">
                                <th class="pb-2">Nombre</th>
                                <th class="pb-2">Teléfono</th>
                                <th class="pb-2">Correo</th>
                                <th class="pb-2 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="clientesTabla" class="divide-y text-gray-700 text-sm">
                            <!-- Los clientes se cargarán aquí dinámicamente -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- CONEXIÓN A FIREBASE (Módulos Modernos) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🛠️ REEMPLAZA ESTOS DATOS CON LOS DE TU PROYECTO DE FIREBASE
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase y Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const clientesRef = collection(db, "clientes");

        // Elementos de la interfaz
        const clientForm = document.getElementById("clientForm");
        const clientesTabla = document.getElementById("clientesTabla");

        // 1. GUARDAR CLIENTE
        clientForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById("nombre").value;
            const telefono = document.getElementById("telefono").value;
            const email = document.getElementById("email").value;

            try {
                await addDoc(clientesRef, { nombre, telefono, email });
                clientForm.reset(); // Limpiar formulario
            } catch (error) {
                console.error("Error al guardar cliente: ", error);
                alert("Hubo un error al guardar el cliente.");
            }
        });

        // 2. LEER CLIENTES EN TIEMPO REAL (onSnapshot)
        onSnapshot(clientesRef, (snapshot) => {
            clientesTabla.innerHTML = ""; // Limpiar tabla antes de recargar
            snapshot.forEach((docSnap) => {
                const cliente = docSnap.data();
                const id = docSnap.id;

                const tr = document.createElement("tr");
                tr.className = "hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="py-3 font-medium">${cliente.nombre}</td>
                    <td class="py-3">${cliente.telefono}</td>
                    <td class="py-3 text-gray-500">${cliente.email || 'N/A'}</td>
                    <td class="py-3 text-right">
                        <button onclick="eliminarCliente('${id}')" class="text-red-500 hover:text-red-700 font-medium">Eliminar</button>
                    </td>
                `;
                clientesTabla.appendChild(tr);
            });
        });

        // 3. ELIMINAR CLIENTE (Hacer función global para que el botón de la tabla la encuentre)
        window.eliminarCliente = async (id) => {
            if (confirm("¿Estás seguro de eliminar este cliente?")) {
                await deleteDoc(doc(db, "clientes", id));
            }
        };
    </script>
</body>
</html>
