<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnoplagas - Facturación y Cotizaciones</title>
  
  <!-- CDNs Oficiales de jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root {
      --primary-color: #00b074; 
      --primary-hover: #009662;
      --blue-btn: #2563eb;
      --blue-hover: #1d4ed8;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #334155;
      --text-muted: #64748b;
      --purple-pdf: #7c3aed;
      --purple-hover: #6d28d9;
      --red-btn: #ef4444;
      --red-hover: #dc2626;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 30px;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .tabs-left {
      display: flex;
      gap: 10px;
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .tab-btn.active-green { background-color: #00b074; color: white; }
    .tab-btn.inactive-gray { background-color: #e2e8f0; color: #475569; }

    .btn-inicio {
      background-color: #64748b; color: white; text-decoration: none;
      padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: bold;
    }

    .titulo-modulo { font-size: 26px; font-weight: bold; color: #1e293b; margin: 0 0 25px 0; }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; font-weight: bold; color: #475569; }

    input, select, textarea {
      width: 100%; box-sizing: border-box; padding: 12px;
      border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px;
    }
    input[readonly] { background-color: #f1f5f9; font-weight: bold; }

    /* Estilos dinámicos para la tabla de ítems del formulario */
    .tabla-items-form {
      width: 100%; border-collapse: collapse; margin-top: 10px;
    }
    .tabla-items-form th { text-align: left; padding: 8px; font-size: 13px; color: #475569; }
    .tabla-items-form td { padding: 6px; }

    .btn-agregar-linea {
      background-color: #4b5563; color: white; border: none; padding: 10px 16px;
      font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 20px;
    }
    .btn-agregar-linea:hover { background-color: #374151; }

    .btn-eliminar-linea {
      background-color: var(--red-btn); color: white; border: none;
      padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;
    }

    .btn-submit {
      width: 100%; background-color: var(--blue-btn); color: white; border: none;
      padding: 15px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
    }
    .btn-submit:hover { background-color: var(--blue-hover); }

    .table-container { overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px; }
    table.historial-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    table.historial-table th { background-color: #f1f5f9; color: #475569; font-weight: bold; padding: 14px; border-bottom: 2px solid var(--border-color); }
    table.historial-table td { padding: 14px; border-bottom: 1px solid var(--border-color); }

    .btn-tabla-editar { background-color: var(--blue-btn); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 5px; }
    .btn-tabla-pdf { background-color: var(--purple-pdf); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }

    .seccion-modulo { display: none; }
    .seccion-modulo.active { display: block; }
  </style>
</head>
<body>

  <div class="container">
    <div class="nav-bar">
      <div class="tabs-left">
        <button id="tab-emitir" class="tab-btn active-green" onclick="cambiarVista('emitir')">📝 Generar Documento</button>
        <button id="tab-historial" class="tab-btn inactive-gray" onclick="cambiarVista('historial')">📋 Ver Historial</button>
      </div>
      <a href="index.html" class="btn-inicio">🏠 Menú Inicio</a>
    </div>

    <!-- PESTAÑA 1: FORMULARIO MULTI-ÍTEMS -->
    <div id="vista-emision" class="seccion-modulo active">
      <div class="titulo-modulo" id="form-titulo">Módulo de Facturación y Cotizaciones</div>
      
      <form id="factura-form">
        <input type="hidden" id="factura-id-edicion">

        <div class="form-row">
          <div class="form-group">
            <label for="tipo-documento">Tipo de documento</label>
            <select id="tipo-documento" required>
              <option value="">Seleccione tipo...</option>
              <option value="Factura Electronica">Factura Electrónica</option>
              <option value="Cotizacion">Cotización / Presupuesto</option>
            </select>
          </div>
          <div class="form-group">
            <label for="consecutivo-doc">Consecutivo</label>
            <input type="text" id="consecutivo-doc" readonly placeholder="Generando...">
          </div>
          <div class="form-group">
            <label for="select-cliente">Cliente Destino</label>
            <select id="select-cliente" required>
              <option value="">Cargando clientes de Firestore...</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="condicion-venta">Condición de venta</label>
            <select id="condicion-venta" required>
              <option value="">Seleccione condición...</option>
              <option value="Contado">Contado</option>
              <option value="Credito 8 dias">Crédito 8 días</option>
              <option value="Credito 15 dias">Crédito 15 días</option>
              <option value="Credito 30 dias">Crédito 30 días</option>
            </select>
          </div>
          <div class="form-group">
            <label for="medio-pago">Medio de Pago</label>
            <select id="medio-pago" required>
              <option value="">Seleccione pago...</option>
              <option value="Transferencia">Transferencia Bancaria</option>
              <option value="Sinpe Movil">SINPE Móvil</option>
              <option value="Efectivo">Efectivo</option>
              <option value="Tarjeta">Tarjeta de Crédito/Débito</option>
            </select>
          </div>
        </div>

        <fieldset style="margin-bottom: 20px;">
          <legend>Líneas de Detalle de Venta</legend>
          <table class="tabla-items-form">
            <thead>
              <tr>
                <th style="width: 55%;">Descripción</th>
                <th style="width: 15%;">Cantidad</th>
                <th style="width: 20%;">Precio Unitario</th>
                <th style="width: 10%;">Acción</th>
              </tr>
            </thead>
            <tbody id="contenedor-lineas-items">
              <!-- Aquí se inyectan las líneas dinámicamente -->
            </tbody>
          </table>
          <button type="button" class="btn-agregar-linea" id="btn-nueva-linea">➕ Agregar Línea</button>
        </fieldset>

        <fieldset style="background-color: #f1f5f9;">
          <legend>Totales Generales Calculados</legend>
          <div class="form-row">
            <div class="form-group">
              <label>SubTotal</label>
              <input type="number" id="total-subtotal" readonly value="0.00">
            </div>
            <div class="form-group">
              <label>Subtotal Neto</label>
              <input type="number" id="total-subtotal-neto" readonly value="0.00">
            </div>
            <div class="form-group">
              <label>Porcentaje IVA (%)</label>
              <select id="porcentaje-iva">
                <option value="13">13% (General)</option>
                <option value="1">1% (Reducido)</option>
                <option value="0">0% (Exento)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Total Impuesto</label>
              <input type="number" id="total-impuesto" readonly value="0.00">
            </div>
            <div class="form-group">
              <label>Total Factura</label>
              <input type="number" id="total-factura" readonly value="0.00" style="color: #00b074; font-size: 16px;">
            </div>
          </div>
        </fieldset>

        <button type="submit" id="btn-submit-factura" class="btn-submit">
          💾 Registrar Documento en Firestore
        </button>
      </form>
    </div>

    <!-- PESTAÑA 2: HISTORIAL -->
    <div id="vista-historial" class="seccion-modulo">
      <div class="titulo-modulo">Historial de Transacciones (Facturacion)</div>
      <div class="table-container">
        <table class="historial-table">
          <thead>
            <tr>
              <th>Consecutivo</th>
              <th>Tipo</th>
              <th>Cliente</th>
              <th>Detalle ítems</th>
              <th>Total Factura</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-historial-body">
            <tr>
              <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">
                Cargando historial de transacciones...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    window.cambiarVista = function(vista) {
      const btnEmitir = document.getElementById('tab-emitir');
      const btnHistorial = document.getElementById('tab-historial');
      const vistaEmision = document.getElementById('vista-emision');
      const vistaHistorial = document.getElementById('vista-historial');

      if (vista === 'emitir') {
        btnEmitir.className = 'tab-btn active-green';
        btnHistorial.className = 'tab-btn inactive-gray';
        vistaEmision.classList.add('active');
        vistaHistorial.classList.remove('active');
      } else {
        btnEmitir.className = 'tab-btn inactive-gray';
        btnHistorial.className = 'tab-btn active-green';
        vistaEmision.classList.remove('active');
        vistaHistorial.classList.add('active');
      }
    }
  </script>

  <!-- CONTROLADORES MODULARES -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "fumigadora-tecnoplagas.firebaseapp.com",
      projectId: "fumigadora-tecnoplagas",
      storageBucket: "fumigadora-tecnoplagas.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let listaClientes = [];
    let listaDocumentosEmitidos = [];

    // --- AGREGAR LÍNEAS DE ITEMS DINÁMICAMENTE ---
    const contenedorLineas = document.getElementById('contenedor-lineas-items');
    
    function crearFilaItem(descripcion = "", cantidad = 1, precio = "") {
      const tr = document.createElement('tr');
      tr.className = 'fila-item-dinamica';
      tr.innerHTML = `
        <td><input type="text" class="item-desc" required placeholder="Ej: Control de Plagas" value="${descripcion}"></td>
        <td><input type="number" class="item-cant" required min="1" value="${cantidad}"></td>
        <td><input type="number" class="item-precio" required min="0" placeholder="0.00" step="0.01" value="${precio}"></td>
        <td style="text-align: center;"><button type="button" class="btn-eliminar-linea">🗑️</button></td>
      `;
      
      // Listeners matemáticos para recalculas totales al escribir
      tr.querySelector('.item-cant').addEventListener('input', ejecutarCalculosFactura);
      tr.querySelector('.item-precio').addEventListener('input', ejecutarCalculosFactura);
      
      // Eliminar línea
      tr.querySelector('.btn-eliminar-linea').addEventListener('click', function() {
        if(document.querySelectorAll('.fila-item-dinamica').length > 1) {
          tr.remove();
          ejecutarCalculosFactura();
        } else {
          alert("Debes tener al menos un ítem en el detalle.");
        }
      });

      contenedorLineas.appendChild(tr);
    }

    document.getElementById('btn-nueva-linea').addEventListener('click', () => crearFilaItem());

    // CALCULO MATEMÁTICO GENERAL DE TODAS LAS LÍNEAS
    function ejecutarCalculosFactura() {
      let subtotalGeneral = 0;
      const filas = document.querySelectorAll('.fila-item-dinamica');
      
      filas.forEach(fila => {
        const cant = parseInt(fila.querySelector('.item-cant').value, 10) || 0;
        const precio = parseFloat(fila.querySelector('.item-precio').value) || 0;
        subtotalGeneral += (cant * precio);
      });

      const porcentajeIva = parseFloat(document.getElementById('porcentaje-iva').value) || 0;
      const totalImpuesto = subtotalGeneral * (porcentajeIva / 100);
      const totalFactura = subtotalGeneral + totalImpuesto;

      document.getElementById('total-subtotal').value = subtotalGeneral.toFixed(2);
      document.getElementById('total-subtotal-neto').value = subtotalGeneral.toFixed(2);
      document.getElementById('total-impuesto').value = totalImpuesto.toFixed(2);
      document.getElementById('total-factura').value = totalFactura.toFixed(2);
    }
    document.getElementById('porcentaje-iva').addEventListener('change', ejecutarCalculosFactura);

    // CONTROL DE CLIENTES
    async function sincronizarSelectClientes() {
      try {
        const querySnapshot = await getDocs(collection(db, "clientes"));
        document.getElementById('select-cliente').innerHTML = '<option value="">Seleccione el cliente destino...</option>';
        listaClientes = [];
        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          listaClientes.push({ id: docSnap.id, ...data });
          const option = document.createElement('option');
          option.value = docSnap.id; 
          option.textContent = `${data.nombre || 'Sin Nombre'} (${data.consecutivo || docSnap.id})`;
          document.getElementById('select-cliente').appendChild(option);
        });
      } catch (err) { console.error(err); }
    }

    // SINCRONIZAR HISTORIAL
    async function sincronizarHistorialYConsecutivo() {
      const tbody = document.getElementById('tabla-historial-body');
      const inputConsecutivo = document.getElementById('consecutivo-doc');
      
      try {
        const querySnapshot = await getDocs(collection(db, "Facturacion"));
        listaDocumentosEmitidos = [];
        if(tbody) tbody.innerHTML = "";

        querySnapshot.forEach((docSnap) => {
          listaDocumentosEmitidos.push({ id: docSnap.id, ...docSnap.data() });
        });

        if(inputConsecutivo && !document.getElementById('factura-id-edicion').value) {
          inputConsecutivo.value = "DOC-" + String(listaDocumentosEmitidos.length + 1).padStart(6, '0');
        }

        if (listaDocumentosEmitidos.length === 0 && tbody) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No hay comprobantes emitidos.</td></tr>`;
          return;
        }

        if(tbody) {
          listaDocumentosEmitidos.forEach((docEmitido) => {
            let idCliente = "";
            if (docEmitido.Cliente && typeof docEmitido.Cliente === 'string') {
              idCliente = docEmitido.Cliente.replace("clientes/", "");
            }
            const objCliente = listaClientes.find(c => c.id === idCliente);
            const nombreMostrar = objCliente ? objCliente.nombre : `ID: ${idCliente}`;

            // Determinar texto para resumir ítems en la tabla
            let resumenItems = "";
            if (docEmitido.items && Array.isArray(docEmitido.items)) {
              resumenItems = docEmitido.items.map(i => `${i.cantidad}x ${i.descripcion}`).join(', ');
            } else {
              resumenItems = docEmitido.Descripcion || "---"; // Retrocompatibilidad
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td style="font-family:monospace; font-weight:bold;">${docEmitido.Consecutivo || '---'}</td>
              <td>${docEmitido["Tipo de documento"] || '---'}</td>
              <td>${nombreMostrar}</td>
              <td style="font-size: 12px; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${resumenItems}</td>
              <td style="font-weight:bold; color:#00b074;">¢${(docEmitido["Total Factura"] || 0).toLocaleString('es-CR', {minimumFractionDigits: 2})}</td>
              <td>
                <button class="btn-tabla-editar" data-id="${docEmitido.id}">✏️ Editar</button>
                <button class="btn-tabla-pdf" data-id="${docEmitido.id}">📄 PDF</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
          inicializarEventosAcciones();
        }
      } catch (err) { console.error(err); }
    }

    function inicializarEventosAcciones() {
      // EVENTO EDITAR (Carga múltiples líneas si existen)
      document.querySelectorAll('.btn-tabla-editar').forEach(btn => {
        btn.addEventListener('click', function() {
          const id = this.getAttribute('data-id');
          const docItem = listaDocumentosEmitidos.find(d => d.id === id);
          if (docItem) {
            document.getElementById('factura-id-edicion').value = id;
            document.getElementById('consecutivo-doc').value = docItem.Consecutivo || "";
            document.getElementById('tipo-documento').value = docItem["Tipo de documento"] || "";
            document.getElementById('condicion-venta').value = docItem["Condición de venta"] || "";
            document.getElementById('medio-pago').value = docItem["Medio de Pago"] || "";
            document.getElementById('porcentaje-iva').value = (docItem.IVA || 0) * 100;

            let cleanIdCliente = "";
            if (docItem.Cliente && typeof docItem.Cliente === 'string') {
              cleanIdCliente = docItem.Cliente.replace("clientes/", "");
            }
            document.getElementById('select-cliente').value = cleanIdCliente;

            // Limpiar y re-inyectar ítems
            contenedorLineas.innerHTML = "";
            if (docItem.items && Array.isArray(docItem.items)) {
              docItem.items.forEach(i => crearFilaItem(i.descripcion, i.cantidad, i.precioUnitario));
            } else {
              // Soporte para facturas viejas de una sola línea
              crearFilaItem(docItem.Descripcion, docItem.Cantidad, docItem["Precio Unitario"]);
            }

            document.getElementById('form-titulo').textContent = "⚠️ Editando Documento Guardado";
            document.getElementById('btn-submit-factura').textContent = "💾 Actualizar Cambios en Base de Datos";
            window.cambiarVista('emitir');
            ejecutarCalculosFactura();
          }
        });
      });

      // EVENTO IMPRIMIR PDF AUTOTABLE MULTI-LINEA
      document.querySelectorAll('.btn-tabla-pdf').forEach(btn => {
        btn.addEventListener('click', function() {
          try {
            const id = this.getAttribute('data-id');
            const docItem = listaDocumentosEmitidos.find(d => d.id === id);
            if (!docItem) return;

            let idCliente = "";
            if (docItem.Cliente && typeof docItem.Cliente === 'string') {
              idCliente = docItem.Cliente.replace("clientes/", "");
            }
            const cInfo = listaClientes.find(c => c.id === idCliente);

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            // Membrete
            pdf.setFillColor(0, 176, 116); pdf.rect(0, 0, 220, 14, 'F');
            pdf.setFont("helvetica", "bold"); pdf.setFontSize(22); pdf.textColor = "#1e293b";
            pdf.text("TECNOPLAGAS", 14, 30);

            pdf.setFontSize(10); pdf.setFont("helvetica", "normal");
            pdf.text("Fumigadora TecnoPlagas C.R.", 14, 36);
            pdf.text("Teléfonos: 7232-5001 / 8987-7776", 14, 41);
            pdf.text("Email: info@tecoplagascrc.com", 14, 46);

            // Caja Derecha
            pdf.setFillColor(241, 245, 249); pdf.rect(125, 20, 71, 28, 'F');
            pdf.setFont("helvetica", "bold"); pdf.setFontSize(11);
            pdf.text(String(docItem["Tipo de documento"] || 'Presupuesto').toUpperCase(), 129, 27);
            pdf.setFontSize(9); pdf.setFont("helvetica", "normal");
            pdf.text(`Consecutivo: ${docItem.Consecutivo || '---'}`, 129, 34);
            let fTxt = docItem["Fecha de Emision"]?.seconds ? new Date(docItem["Fecha de Emision"].seconds * 1000).toLocaleDateString('es-CR') : "---";
            pdf.text(`Fecha Emisión: ${fTxt}`, 129, 41);

            pdf.line(14, 53, 196, 53);

            // Cliente y Condiciones
            pdf.setFont("helvetica", "bold"); pdf.text("DATOS DEL CLIENTE", 14, 61);
            pdf.setFont("helvetica", "normal");
            pdf.text(`Nombre/Razón Social: ${cInfo ? cInfo.nombre : '---'}`, 14, 67);
            pdf.text(`Cédula: ${cInfo ? cInfo.cedula : '---'}`, 14, 72);
            pdf.text(`Ubicación: ${cInfo ? (cInfo.direccion || '---') : '---'}`, 14, 77, { maxWidth: 100 });

            pdf.setFont("helvetica", "bold"); pdf.text("CONDICIONES DE VENTA", 125, 61);
            pdf.setFont("helvetica", "normal");
            pdf.text(`Término: ${docItem["Condición de venta"] || 'Contado'}`, 125, 67);
            pdf.text(`Medio de Pago: ${docItem["Medio de Pago"] || '---'}`, 125, 72);

            // CONSTRUCCIÓN DE FILAS DE LA TABLA DEL PDF
            let tablaCuerpo = [];
            if (docItem.items && Array.isArray(docItem.items)) {
              tablaCuerpo = docItem.items.map(i => [
                i.descripcion,
                i.cantidad,
                `¢${i.precioUnitario.toLocaleString('es-CR', {minimumFractionDigits:2})}`,
                `¢${(i.cantidad * i.precioUnitario).toLocaleString('es-CR', {minimumFractionDigits:2})}`
              ]);
            } else {
              // Mapeo viejo
              tablaCuerpo = [[
                docItem.Descripcion || '---', docItem.Cantidad || 1,
                `¢${(docItem["Precio Unitario"] || 0).toLocaleString('es-CR', {minimumFractionDigits:2})}`,
                `¢${(docItem.SubTotal || 0).toLocaleString('es-CR', {minimumFractionDigits:2})}`
              ]];
            }

            pdf.autoTable({
              startY: 92,
              head: [['Descripción del Servicio', 'Cantidad', 'Precio Unitario', 'Monto Bruto']],
              body: tablaCuerpo,
              headStyles: { fillColor: [0, 176, 116], fontStyle: 'bold' },
              theme: 'striped', styles: { fontSize: 9 }
            });

            const finalY = pdf.lastAutoTable?.finalY ? pdf.lastAutoTable.finalY + 10 : 130;
            
            // Totales
            pdf.setFont("helvetica", "normal"); pdf.text("Subtotal:", 130, finalY);
            pdf.text(`¢${(docItem.SubTotal || 0).toLocaleString('es-CR', {minimumFractionDigits: 2})}`, 168, finalY);
            pdf.text(`Impuesto IVA (${(docItem.IVA * 100) || 0}%):`, 130, finalY + 6);
            pdf.text(`¢${(docItem["Total Impuesto"] || 0).toLocaleString('es-CR', {minimumFractionDigits: 2})}`, 168, finalY + 6);
            pdf.line(130, finalY + 9, 196, finalY + 9);
            pdf.setFont("helvetica", "bold"); pdf.text("Total Facturado:", 130, finalY + 14);
            pdf.text(`¢${(docItem["Total Factura"] || 0).toLocaleString('es-CR', {minimumFractionDigits: 2})}`, 168, finalY + 14);

            pdf.save(`${docItem.Consecutivo || 'Doc'}_Tecnoplagas.pdf`);
          } catch (err) { console.error(err); }
        });
      });
    }

    // ENVIAR O ACTUALIZAR DOCUMENTO COMPLETO
    document.getElementById('factura-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const idEdicion = document.getElementById('factura-id-edicion').value;
      const idClienteSeleccionado = document.getElementById('select-cliente').value;

      // Estructuramos el arreglo de ítems leyendo la UI
      const itemsGuardar = [];
      document.querySelectorAll('.fila-item-dinamica').forEach(fila => {
        itemsGuardar.push({
          descripcion: fila.querySelector('.item-desc').value,
          cantidad: parseInt(fila.querySelector('.item-cant').value, 10),
          precioUnitario: parseFloat(fila.querySelector('.item-precio').value)
        });
      });

      const payloadFactura = {
        "items": itemsGuardar, // Nueva estructura limpia para multi-ítems
        "Cliente": `clientes/${idClienteSeleccionado}`,
        "Condición de venta": document.getElementById('condicion-venta').value,
        "Consecutivo": document.getElementById('consecutivo-doc').value,
        "IVA": parseFloat(document.getElementById('porcentaje-iva').value) / 100,
        "Medio de Pago": document.getElementById('medio-pago').value,
        "SubTotal": parseFloat(document.getElementById('total-subtotal').value),
        "Subtotal Neto": parseFloat(document.getElementById('total-subtotal-neto').value),
        "Tipo de documento": document.getElementById('tipo-documento').value,
        "Total Factura": parseFloat(document.getElementById('total-factura').value),
        "Total Impuesto": parseFloat(document.getElementById('total-impuesto').value),
        
        // Mantener estos dos para soporte de búsquedas globales viejas en base si se requiere
        "Descripcion": itemsGuardar[0]?.descripcion || "",
        "Cantidad": itemsGuardar[0]?.cantidad || 1,
        "Precio Unitario": itemsGuardar[0]?.precioUnitario || 0
      };

      try {
        if (idEdicion) {
          await updateDoc(doc(db, "Facturacion", idEdicion), payloadFactura);
          alert("✅ Documento multi-línea actualizado con éxito!");
          document.getElementById('factura-id-edicion').value = "";
          document.getElementById('form-titulo').textContent = "Módulo de Facturación y Cotizaciones";
        } else {
          payloadFactura["Fecha de Emision"] = Timestamp.now();
          await addDoc(collection(db, "Facturacion"), payloadFactura);
          alert("🎉 ¡Documento multi-línea registrado con éxito!");
        }

        document.getElementById('factura-form').reset();
        contenedorLineas.innerHTML = "";
        crearFilaItem(); // Dejar una fila vacía base
        ejecutarCalculosFactura();
        await sincronizarHistorialYConsecutivo();
        window.cambiarVista('historial');
      } catch (err) { console.error(err); }
    });

    async function inicializarModulo() {
      await sincronizarSelectClientes();
      crearFilaItem(); // Generar primera línea inicial por defecto
      await sincronizarHistorialYConsecutivo();
    }
    inicializarModulo();
  </script>
</body>
</html>
